<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Portal | Play Free Online Games</title>
    <meta name="description" content="A clean and simple portal for playing unblocked web games via iframes.">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-zinc-950/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer group" onclick="backToGrid()">
                <div class="w-10 h-10 rounded-xl bg-emerald-500 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="text-zinc-950 w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="8" cy="12" r="2"/><path d="M16 12h2"/><path d="M17 11v2"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                </div>
                <h1 class="font-display text-xl font-bold tracking-tight">
                    UNBLOCKED<span class="text-emerald-500">GAMES</span>
                </h1>
            </div>

            <div id="search-container" class="relative max-w-md w-full ml-4 hidden md:block">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search games..."
                    oninput="handleSearch(event)"
                    class="w-full bg-zinc-900 border border-white/10 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all"
                >
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <!-- Content will be injected here by main.js -->
        <div class="flex items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-500"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2 opacity-50">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="8" cy="12" r="2"/><path d="M16 12h2"/><path d="M17 11v2"/></svg>
                <span class="text-sm font-display font-bold">UNBLOCKED GAMES</span>
            </div>
            <p class="text-zinc-500 text-sm">
                &copy; <span id="year"></span> Unblocked Games Portal. All rights reserved.
            </p>
            <div class="flex items-center gap-6">
                <a href="#" class="text-zinc-500 hover:text-white text-sm transition-colors">Privacy</a>
                <a href="#" class="text-zinc-500 hover:text-white text-sm transition-colors">Terms</a>
                <a href="#" class="text-zinc-500 hover:text-white text-sm transition-colors">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
